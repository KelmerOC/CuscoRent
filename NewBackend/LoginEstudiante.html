<!DOCTYPE html>

<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

        rel="stylesheet" />

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#ff9f1c",

                        "on-primary-fixed": "#2c1700",

                        "secondary-fixed": "#c4e7ff",
                        "surface-container-highest": "#e2e2e2",
                        "secondary-fixed-dim": "#7bd0ff",
                        "error-container": "#ffdad6",
                        "inverse-primary": "#ffb86b",
                        "primary-fixed-dim": "#ffb86b",
                        "secondary-container": "#40c2fd",

                    "borderRadius": {

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .filled-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col relative overflow-hidden">
    <!-- Background Image -->
    <div class="absolute inset-0 z-0">
        <div class="bg-cover bg-center w-full h-full opacity-60"
            data-alt="A warm, atmospheric wide shot of the historic city of Cusco, Peru at golden hour. The sunlight casts long, soft shadows over the terracotta rooftops and ancient stone walls. The sky is a gradient of soft orange and sky blue. The scene is bright, inviting, and professional, perfectly suited as a modern background for a high-end application. The composition leaves plenty of negative space in the center."
            style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDPXQETFjjbk8NpOpyUHLRU2poIAIL0RoSat0TlEWqLZrrtu9Tgy_uPCok1h761ZpOfv2c-2dYgShSBzkR5cUB5E56zhcdG5A_f2EwaPwOOtlyjBzymaollivOoFBM7QoZPW5-9P5uyRTMaspJ_Bys5Eh5vEUfqgLB-eqK9bKs_AtTIPafsxQJOmTNfgQ4a1b4QjminAQmWfoc930rSnbz1dOQRjxuD-rbB7Yd45_q-Op5gTr9Ul0gNxODhZf_L0Rc8_cQQblVskIBG')">
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-surface via-surface/80 to-surface/20"></div>
    </div>
    <!-- Main Content Canvas -->
    <main class="flex-grow flex items-center justify-center relative z-10 px-screen-margin py-stack-lg">
        <!-- Login Card -->
        <div
            class="bg-surface-card w-full max-w-md rounded-lg shadow-2xl border border-outline-variant p-stack-lg flex flex-col gap-stack-lg relative overflow-hidden">
            <!-- Decorative Top Accent -->
            <div class="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-primary to-primary-container"></div>
            <!-- Brand Header -->
            <div class="text-center flex flex-col items-center gap-stack-sm mt-stack-sm">
                <span class="material-symbols-outlined filled-icon text-4xl text-primary mb-2">location_city</span>
                <h1 class="font-headline-lg text-headline-lg text-primary">Andean Modern</h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Encuentra tu hogar ideal para estudiar</p>
            </div>
            <!-- Login Form -->
            <form action="#" class="flex flex-col gap-stack-md" method="POST">
                <!-- Email Input -->
                <div class="flex flex-col gap-stack-sm">
                    <label class="font-label-lg text-label-lg text-on-surface" for="email">Correo Universitario</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-on-surface-variant">school</span>
                        </div>
                        <input
                            class="bg-surface-container-low border border-outline-variant text-on-surface text-body-md font-body-md rounded-DEFAULT focus:ring-2 focus:ring-primary-container focus:border-primary-container block w-full pl-10 p-2.5 transition-colors"
                            id="email" name="email" placeholder="usuario@unsch.edu.pe" required="" type="email" />
                    </div>
                </div>
                <!-- Password Input -->
                <div class="flex flex-col gap-stack-sm">
                    <label class="font-label-lg text-label-lg text-on-surface" for="password">Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-on-surface-variant">lock</span>
                        </div>
                        <input
                            class="bg-surface-container-low border border-outline-variant text-on-surface text-body-md font-body-md rounded-DEFAULT focus:ring-2 focus:ring-primary-container focus:border-primary-container block w-full pl-10 pr-10 p-2.5 transition-colors"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                        <button
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none"
                            type="button">
                            <span class="material-symbols-outlined">visibility_off</span>
                        </button>
                    </div>
                </div>
                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between mt-2">
                    <div class="flex items-center">
                        <input
                            class="h-4 w-4 text-primary-container focus:ring-primary border-outline-variant rounded bg-surface-container-low"
                            id="remember-me" name="remember-me" type="checkbox" />
                        <label class="ml-2 block font-body-md text-body-md text-on-surface-variant" for="remember-me">
                            Recordarme
                        </label>
                    </div>
                    <div class="text-sm">
                        <a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors"
                            href="#">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>
                </div>
                <!-- Submit Button -->
                <button
                    class="mt-stack-sm w-full bg-primary-container text-on-primary font-label-lg text-label-lg py-3 px-4 rounded-full hover:bg-primary transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container shadow-md active:scale-95 duration-150 flex justify-center items-center gap-2"
                    type="submit">
                    Iniciar Sesión
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </form>
            <!-- Sign Up Link -->
            <div class="text-center mt-stack-sm pt-stack-md border-t border-surface-container-highest">
                <p class="font-body-md text-body-md text-on-surface-variant">
                    ¿Eres nuevo en Cusco?
                    <a class="font-label-lg text-label-lg text-secondary hover:text-secondary-container transition-colors ml-1"
                        href="#">
                        Crear cuenta
                    </a>
                </p>
            </div>
        </div>
    </main>
    <!-- Footer Component Injection (Suppressed for Context) -->
    <!-- Navigation Shells (Top/Side/Bottom) are correctly suppressed for a transactional Login page -->
</body>

</html>
