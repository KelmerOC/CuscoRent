<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Iniciar Sesión - CuscoRent</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: '#c28e46',
                        sidebar: '#45121a',
                        secondary: '#b85151',
                        terracotta: '#b85151',
                        bglite: '#faf8f5',
                        charcoal: '#211f1d',
                        burgundy: '#45121a',
                        sage: '#8fa08e',
                        skyblue: '#3a82c4',
                        'border-color': '#e6dec9'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 12px rgba(0,0,0,0.05)',
                        'card': '0 8px 30px rgb(0,0,0,0.04)',
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .filled-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="font-sans text-charcoal antialiased min-h-screen">
    <!-- Background Image -->
    <div class="fixed inset-0 z-0">
        <div class="bg-cover bg-center w-full h-full opacity-60"
            data-alt="A warm, atmospheric wide shot of the historic city of Cusco, Peru at golden hour. The sunlight casts long, soft shadows over the terracotta rooftops and ancient stone walls. The sky is a gradient of soft orange and sky blue. The scene is bright, inviting, and professional, perfectly suited as a modern background for a high-end application. The composition leaves plenty of negative space in the center."
            style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDPXQETFjjbk8NpOpyUHLRU2poIAIL0RoSat0TlEWqLZrrtu9Tgy_uPCok1h761ZpOfv2c-2dYgShSBzkR5cUB5E56zhcdG5A_f2EwaPwOOtlyjBzymaollivOoFBM7QoZPW5-9P5uyRTMaspJ_Bys5Eh5vEUfqgLB-eqK9bKs_AtTIPafsxQJOmTNfgQ4a1b4QjminAQmWfoc930rSnbz1dOQRjxuD-rbB7Yd45_q-Op5gTr9Ul0gNxODhZf_L0Rc8_cQQblVskIBG')">
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-charcoal/80 via-charcoal/40 to-charcoal/10"></div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center relative z-10 min-h-screen px-4 py-10">
        <!-- Login Card -->
        <div class="bg-white rounded-[24px] shadow-xl w-full max-w-md p-8 relative overflow-hidden">
            <!-- Accent Bar -->
            <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-primary via-terracotta to-skyblue"></div>

            <!-- Brand Header -->
            <div class="text-center flex flex-col items-center gap-2 mt-4 mb-2">
                <span class="material-symbols-outlined filled-icon text-4xl text-primary mb-1">location_city</span>
                <h1 class="text-2xl font-bold tracking-tight">
                    <span class="font-serif text-charcoal">Cusco</span><span class="font-serif text-primary">Rent</span>
                </h1>
                <p class="text-sm text-gray-500">Encuentra tu hogar ideal para estudiar</p>
            </div>

            <!-- Login Form -->
            <form action="#" class="flex flex-col gap-5 mt-6" method="POST">
                <!-- Email Input -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-semibold text-charcoal" for="email">Correo Universitario</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-gray-400 text-xl">school</span>
                        </div>
                        <input
                            class="border border-gray-200 rounded-xl px-4 py-3.5 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all w-full pl-11 text-sm text-charcoal placeholder-gray-400"
                            id="email" name="email" placeholder="usuario@unsch.edu.pe" required="" type="email" />
                    </div>
                </div>

                <!-- Password Input -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-semibold text-charcoal" for="password">Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-gray-400 text-xl">lock</span>
                        </div>
                        <input
                            class="border border-gray-200 rounded-xl px-4 py-3.5 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all w-full pl-11 pr-11 text-sm text-charcoal placeholder-gray-400"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                        <button
                            class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-primary transition-colors focus:outline-none"
                            type="button">
                            <span class="material-symbols-outlined text-xl">visibility_off</span>
                        </button>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between mt-1">
                    <div class="flex items-center">
                        <input
                            class="h-4 w-4 text-primary focus:ring-primary/30 border-gray-300 rounded bg-gray-50"
                            id="remember-me" name="remember-me" type="checkbox" />
                        <label class="ml-2 block text-sm text-gray-500" for="remember-me">
                            Recordarme
                        </label>
                    </div>
                    <div class="text-sm">
                        <a class="font-medium text-primary hover:text-primary/80 transition-colors" href="#">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>
                </div>

                <!-- Submit Button -->
                <button
                    class="bg-primary text-white rounded-full w-full py-3.5 font-semibold hover:bg-primary/90 active:scale-[0.97] transition-all shadow-md mt-2 flex justify-center items-center gap-2 text-sm"
                    type="submit">
                    Iniciar Sesión
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
                </button>
            </form>

            <!-- Sign Up Link -->
            <div class="text-center mt-6 pt-5 border-t border-gray-100">
                <p class="text-sm text-gray-500">
                    ¿Eres nuevo en Cusco?
                    <a class="font-semibold text-skyblue hover:text-skyblue/80 transition-colors ml-1" href="#">
                        Crear cuenta
                    </a>
                </p>
            </div>
        </div>
    </main>
</body>

</html>
