<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Acceso Arrendadores - CuscoRent</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: '#c28e46',
                        sidebar: '#45121a',
                        secondary: '#b85151',
                        terracotta: '#b85151',
                        bglite: '#faf8f5',
                        charcoal: '#211f1d',
                        burgundy: '#45121a',
                        sage: '#8fa08e',
                        skyblue: '#3a82c4',
                        'border-color': '#e6dec9'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 12px rgba(0,0,0,0.05)',
                        'card': '0 8px 30px rgb(0,0,0,0.04)',
                    }
                }
            }
        }
    </script>
    <style>
        .pattern-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%23c28e46' fill-opacity='0.08' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
    </style>
</head>

<body class="font-sans text-charcoal antialiased min-h-screen">
    <!-- Login Container -->
    <main
        class="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row relative z-10 mx-auto my-10">
        <!-- Left Panel: Branding & Imagery -->
        <section class="hidden md:block md:w-1/2 relative bg-charcoal">
            <div class="absolute inset-0 bg-cover bg-center"
                data-alt="A serene, high-quality architectural photograph of a modern apartment interior with subtle Andean textural elements. Bright, natural daylight streams in, creating a clean, white-base palette punctuated by warm earth tones and a touch of tangerine. The mood is professional, reliable, and optimistic, perfectly suited for a high-end property management platform in Cusco."
                style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBeeoiJkq-3rKw1WQc-v8FI1oHzpt-u4SGRU9SV-zsp6rR9ltgM_z0HM6v_Mjc9t3WD-GoTIf_NxnlITNjfhgGZPAqceDsIAvEUi_vgoWPGsAnk5dG55RUlT2-uQtYXFXVeFDLmZtdLIt-j_UpVWg0NbpMm9oU5iZq4Dc2EjT2RoSZTWIFWa3aIanh_PHaNVH9wEbtd3QkzMV5DsNB1gVA0pIAN3AFRCGPPuKlmREo-VYqqlryKQeaqyCW7MbNd2qWgFfMmqpXoW3TY')">
            </div>
            <div class="absolute inset-0 bg-gradient-to-t from-sidebar/80 to-transparent"></div>
            <div class="absolute bottom-0 left-0 p-8 w-full">
                <h1 class="mb-3">
                    <span class="font-serif text-charcoal text-3xl">Cusco</span><span class="font-serif text-primary text-3xl">Rent</span>
                </h1>
                <p class="text-white/90 text-sm leading-relaxed">Gestión de propiedades de confianza en el
                    corazón de Cusco.</p>
            </div>
        </section>
        <!-- Right Panel: Login Form -->
        <section class="w-full md:w-1/2 p-10 flex flex-col justify-center bg-white">
            <div class="mb-8">
                <h2 class="font-serif text-charcoal text-2xl mb-2">Acceso Arrendadores</h2>
                <p class="text-gray-500 text-sm">Ingrese a su panel de control para
                    gestionar sus propiedades y contratos.</p>
            </div>
            <form action="#" class="flex flex-col gap-4" method="POST">
                <!-- Email Input -->
                <div>
                    <label class="block text-sm font-medium text-charcoal mb-1.5" for="email">Correo
                        Electrónico</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-lg">mail</span>
                        <input
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm text-charcoal placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            id="email" name="email" placeholder="ejemplo@correo.com" required="" type="email" />
                    </div>
                </div>
                <!-- Password Input -->
                <div>
                    <label class="block text-sm font-medium text-charcoal mb-1.5"
                        for="password">Contraseña</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-lg">lock</span>
                        <input
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm text-charcoal placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                    </div>
                </div>
                <!-- Utility Links -->
                <div class="flex items-center justify-between mt-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input
                            class="rounded text-primary focus:ring-primary border-gray-300 bg-gray-50"
                            type="checkbox" />
                        <span
                            class="text-sm text-gray-500 group-hover:text-charcoal transition-colors">Recordarme</span>
                    </label>
                    <a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors"
                        href="#">¿Recuperar Cuenta?</a>
                </div>
                <!-- Login Button -->
                <button
                    class="w-full mt-3 bg-primary text-white rounded-full py-3.5 font-semibold hover:bg-primary/90 active:scale-[0.97] transition-all flex items-center justify-center gap-2 shadow-md"
                    type="submit">
                    <span>Acceso Arrendadores</span>
                    <span class="material-symbols-outlined text-lg"
                        style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
                </button>
            </form>
            <!-- Divider -->
            <div class="flex items-center gap-4 my-6">
                <div class="flex-1 h-px bg-gray-200"></div>
                <span class="text-xs text-gray-400 uppercase tracking-wider">Opciones de
                    Verificación</span>
                <div class="flex-1 h-px bg-gray-200"></div>
            </div>
            <!-- Alternative Actions -->
            <div class="flex flex-col gap-4">
                <button
                    class="w-full bg-white border border-gray-200 text-charcoal text-sm font-medium py-3 rounded-xl hover:bg-gray-50 transition-colors flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-secondary text-lg">badge</span>
                    Verificación DNI con Reniec
                </button>
                <p class="text-sm text-center text-gray-500 mt-1">
                    ¿Nuevo arrendador? <a class="text-sm font-medium text-primary hover:underline"
                        href="#">Registro Oficial</a>
                </p>
            </div>
        </section>
    </main>
    <!-- Footer -->
    <div class="absolute bottom-6 w-full text-center hidden md:block">
        <p class="text-xs text-gray-400">&copy; 2024 CuscoRent. Cusco, Per&uacute;.</p>
    </div>
</body>

</html>
