<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CuscoRent - Selecciona tu Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: '#c28e46',
                        sidebar: '#45121a',
                        secondary: '#b85151',
                        terracotta: '#b85151',
                        bglite: '#faf8f5',
                        charcoal: '#211f1d',
                        burgundy: '#45121a',
                        sage: '#8fa08e',
                        skyblue: '#3a82c4',
                        'border-color': '#e6dec9'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 12px rgba(0,0,0,0.05)',
                        'card': '0 8px 30px rgb(0,0,0,0.04)',
                        'card-hover': '0 20px 60px rgb(0,0,0,0.08)',
                    },
                    borderRadius: {
                        '2xl': '20px',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-bglite font-sans text-charcoal antialiased min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Logo -->
    <div class="mb-10 text-center">
        <span class="font-serif text-charcoal text-3xl font-bold">Cusco</span><span
            class="font-serif text-primary text-3xl font-bold">Rent</span>
    </div>

    <!-- Title -->
    <h1 class="font-serif text-charcoal text-4xl md:text-5xl font-bold text-center mb-4">
        ¿Cómo deseas usar CuscoRent?
    </h1>
    <p class="text-charcoal/60 text-lg text-center mb-12 max-w-lg">
        Selecciona tu perfil para comenzar a explorar la mejor experiencia de alquiler estudiantil en Cusco.
    </p>

    <!-- Cards Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-5xl">

        <!-- Student Card -->
        <button
            class="group text-left bg-white rounded-[20px] shadow-card hover:shadow-card-hover hover:-translate-y-2 transition-all duration-500 border border-transparent hover:border-primary/30 overflow-hidden flex flex-col focus:outline-none focus:ring-4 focus:ring-primary/20">
            <div class="relative aspect-[4/3] overflow-hidden rounded-t-[20px]">
                <img alt="Habitación de estudiante en Cusco"
                    class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
                    data-alt="A bright, modern bedroom designed for a student, featuring elements of historic Cusco architecture like subtle stone textures combined with contemporary clean lines. Soft, optimistic light filters through a large window. The space feels highly organized, airy, and welcoming, decorated in a palette of warm whites, natural wood, and touches of tangerine and sky blue to match a corporate modern aesthetic."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBn1DuOC67c9WELAX1gVCMqzpyINCuQcsYuJ4ETFTw9Cca42VSQ_aGK2WOKQzEArPxK3s8Q7ZELF5F1ETPAFMHSZj4gCznCyk0VUd-vSuh4P98jxXlda_Pax9e4vykmm5ElB84N25u11GBYi6Fdl8tvaJCBiWGOX4pxh4_ZJCiCGxosnfarpiJ11AtfrAVXlkx9X2BiczIFeN2YBbkXy8EarGM_kEJjBAKFLRSxZYy58q2PoSM7laPAaeaZaRaVSKIki08tBRX3S060" />
                <div class="absolute inset-0 bg-gradient-to-t from-charcoal/60 via-transparent to-transparent"></div>
                <span
                    class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-sm text-charcoal text-sm font-medium px-4 py-1.5 rounded-full">Buscando
                    Hogar</span>
            </div>
            <div class="p-8 flex flex-col flex-grow">
                <h2
                    class="font-serif text-2xl text-charcoal mb-3 group-hover:text-primary transition-colors">
                    Soy Estudiante</h2>
                <p class="text-charcoal/60 mb-8 flex-grow leading-relaxed">
                    Explora habitaciones verificadas, conecta con arrendadores confiables y encuentra el espacio
                    perfecto cerca de tu universidad en Cusco.
                </p>
                <span
                    class="inline-flex items-center gap-2 bg-primary text-white rounded-full px-8 py-3 font-medium self-start group-hover:bg-primary/90 active:scale-95 transition-all">
                    Continuar como Estudiante
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </span>
            </div>
        </button>

        <!-- Landlord Card -->
        <button
            class="group text-left bg-white rounded-[20px] shadow-card hover:shadow-card-hover hover:-translate-y-2 transition-all duration-500 border border-transparent hover:border-primary/30 overflow-hidden flex flex-col focus:outline-none focus:ring-4 focus:ring-primary/20">
            <div class="relative aspect-[4/3] overflow-hidden rounded-t-[20px]">
                <img alt="Arrendador profesional en su propiedad"
                    class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
                    data-alt="A professional yet approachable portrait of a property owner standing in a well-lit, contemporary apartment interior in Cusco. The individual exudes trust, reliability, and warmth. The background shows a beautifully maintained living space with clean white walls and modern furnishings. The lighting is high-key and flattering, emphasizing a clean, efficient, and welcoming atmosphere suitable for a premium rental platform."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAN89iDbdVdyeziatyEiTPNRVfAekJAX8gIb7XVTfzvB_GlKUUOdO_O--bIKX7sFfO1npOJK6nLaimeyL6Ko8VMlWpc6NXybURjNL7t7yJbMZMVbAALJHmbjsOizyvNDeqewAYLuyFsi52lAFy3ulSeW0UtRg_lRGXk7f6aNCDeLjzVr03374SbLAFNzBY8nzN_evkrwstpc2GHAvIYxNqmjw6_cMVqBa2Ucx5OcobG-YHB3aDWvnKarxI-sEAbyXZgTJ7pX5PQFKSj" />
                <div class="absolute inset-0 bg-gradient-to-t from-charcoal/60 via-transparent to-transparent"></div>
                <span
                    class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-sm text-charcoal text-sm font-medium px-4 py-1.5 rounded-full">Ofreciendo
                    Espacio</span>
            </div>
            <div class="p-8 flex flex-col flex-grow">
                <h2
                    class="font-serif text-2xl text-charcoal mb-3 group-hover:text-primary transition-colors">
                    Soy Arrendador</h2>
                <p class="text-charcoal/60 mb-8 flex-grow leading-relaxed">
                    Publica tus propiedades, gestiona solicitudes fácilmente y alquila tus habitaciones a estudiantes
                    verificados de manera segura.
                </p>
                <span
                    class="inline-flex items-center gap-2 bg-primary text-white rounded-full px-8 py-3 font-medium self-start group-hover:bg-primary/90 active:scale-95 transition-all">
                    Continuar como Arrendador
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </span>
            </div>
        </button>

    </div>
</body>

</html>
