<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Andean Modern - Selecciona tu Perfil</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"

            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>

                        "on-secondary": "#ffffff",

                        "surface-tint": "#895100",
                        "surface-dim": "#dadad9",
                        "outline-variant": "#dac2ae",
                        "surface": "#f9f9f9",
                        "on-tertiary-container": "#683c00",
                        "surface-card": "#ffffff",
                        "on-primary-fixed": "#2c1700",
                        "on-background": "#1a1c1c",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#544434",

                        "on-secondary-container": "#004d6a",
                        "surface-bright": "#f9f9f9",
                        "tertiary-fixed": "#ffdcbc",
                        "outline-muted": "#dac2ae",
                        "on-surface": "#1a1c1c",
                        "inverse-surface": "#2f3131",
                        "outline": "#877462",
                        "inverse-on-surface": "#f1f1f0",
                        "secondary-fixed": "#c4e7ff",
                        "surface-container-highest": "#e2e2e2",
                        "secondary-fixed-dim": "#7bd0ff",
                        "error-container": "#ffdad6",

                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "screen-margin": "20px",
                        "stack-sm": "8px",
                        "stack-lg": "24px",
                        "chassis-padding": "12px",
                        "stack-md": "16px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],

<body
    class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-screen-margin selection:bg-primary-container selection:text-on-primary-container">
    <div class="text-center mb-12 flex flex-col items-center">
        <h1 class="font-headline-lg text-headline-lg text-primary mb-stack-sm tracking-tight flex items-center gap-2">
            <span class="material-symbols-outlined"
                style="font-variation-settings: 'FILL' 1; font-size: 32px; color: #ff9f1c;">roofing</span>
            Andean Modern
        </h1>
        <p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">
            Bienvenido a la comunidad. Por favor, selecciona cómo deseas usar la plataforma hoy.
        </p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-stack-lg w-full max-w-5xl mx-auto">
        <button
            class="group text-left bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-md hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 ease-out overflow-hidden flex flex-col focus:outline-none focus:ring-4 focus:ring-primary-container/50">
            <div class="relative h-72 w-full overflow-hidden bg-surface-container-low">
                <img alt="Habitación de estudiante en Cusco"
                    class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-in-out"
                    data-alt="A bright, modern bedroom designed for a student, featuring elements of historic Cusco architecture like subtle stone textures combined with contemporary clean lines. Soft, optimistic light filters through a large window. The space feels highly organized, airy, and welcoming, decorated in a palette of warm whites, natural wood, and touches of tangerine and sky blue to match a corporate modern aesthetic."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBn1DuOC67c9WELAX1gVCMqzpyINCuQcsYuJ4ETFTw9Cca42VSQ_aGK2WOKQzEArPxK3s8Q7ZELF5F1ETPAFMHSZj4gCznCyk0VUd-vSuh4P98jxXlda_Pax9e4vykmm5ElB84N25u11GBYi6Fdl8tvaJCBiWGOX4pxh4_ZJCiCGxosnfarpiJ11AtfrAVXlkx9X2BiczIFeN2YBbkXy8EarGM_kEJjBAKFLRSxZYy58q2PoSM7laPAaeaZaRaVSKIki08tBRX3S060" />
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/0 to-transparent"></div>
                <div class="absolute bottom-stack-md left-stack-md right-stack-md flex items-center justify-between">
                    <span
                        class="bg-surface-container-lowest text-primary font-label-sm text-label-sm px-3 py-1 rounded-full shadow-sm">Buscando
                        Hogar</span>
                    <span class="material-symbols-outlined text-on-secondary"
                        style="font-variation-settings: 'FILL' 1;">search</span>
                </div>
            </div>
            <div class="p-stack-lg flex flex-col flex-grow">
                <h2
                    class="font-headline-md text-headline-md text-primary mb-stack-sm group-hover:text-tertiary-container transition-colors">
                    Soy Estudiante</h2>
                <p class="font-body-md text-body-md text-on-surface-variant mb-stack-lg flex-grow">
                    Explora habitaciones verificadas, conecta con arrendadores confiables y encuentra el espacio
                    perfecto cerca de tu universidad en Cusco.
                </p>
                <div
                    class="inline-flex items-center self-start gap-2 bg-surface-container-low text-primary font-label-lg text-label-lg px-6 py-3 rounded-full group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
                    Continuar como Estudiante
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </div>
            </div>
        </button>
        <button
            class="group text-left bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-md hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 ease-out overflow-hidden flex flex-col focus:outline-none focus:ring-4 focus:ring-primary-container/50">
            <div class="relative h-72 w-full overflow-hidden bg-surface-container-low">
                <img alt="Arrendador profesional en su propiedad"
                    class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-in-out"
                    data-alt="A professional yet approachable portrait of a property owner standing in a well-lit, contemporary apartment interior in Cusco. The individual exudes trust, reliability, and warmth. The background shows a beautifully maintained living space with clean white walls and modern furnishings. The lighting is high-key and flattering, emphasizing a clean, efficient, and welcoming atmosphere suitable for a premium rental platform."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAN89iDbdVdyeziatyEiTPNRVfAekJAX8gIb7XVTfzvB_GlKUUOdO_O--bIKX7sFfO1npOJK6nLaimeyL6Ko8VMlWpc6NXybURjNL7t7yJbMZMVbAALJHmbjsOizyvNDeqewAYLuyFsi52lAFy3ulSeW0UtRg_lRGXk7f6aNCDeLjzVr03374SbLAFNzBY8nzN_evkrwstpc2GHAvIYxNqmjw6_cMVqBa2Ucx5OcobG-YHB3aDWvnKarxI-sEAbyXZgTJ7pX5PQFKSj" />
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/0 to-transparent"></div>
                <div class="absolute bottom-stack-md left-stack-md right-stack-md flex items-center justify-between">
                    <span
                        class="bg-surface-container-lowest text-primary font-label-sm text-label-sm px-3 py-1 rounded-full shadow-sm">Ofreciendo
                        Espacio</span>
                    <span class="material-symbols-outlined text-on-secondary"
                        style="font-variation-settings: 'FILL' 1;">add_home</span>
                </div>
            </div>
            <div class="p-stack-lg flex flex-col flex-grow">
                <h2
                    class="font-headline-md text-headline-md text-primary mb-stack-sm group-hover:text-tertiary-container transition-colors">
                    Soy Arrendador</h2>
                <p class="font-body-md text-body-md text-on-surface-variant mb-stack-lg flex-grow">
                    Publica tus propiedades, gestiona solicitudes fácilmente y alquila tus habitaciones a estudiantes
                    verificados de manera segura.
                </p>
                <div
                    class="inline-flex items-center self-start gap-2 bg-surface-container-low text-primary font-label-lg text-label-lg px-6 py-3 rounded-full group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
                    Continuar como Arrendador
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </div>
            </div>
        </button>
    </div>
</body>

</html>
