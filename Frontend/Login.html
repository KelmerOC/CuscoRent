    <script>
      const SCRIPT_URL = "<?= getScriptUrl() ?>";
      
      // Select Estudiante by default on load
      document.addEventListener('DOMContentLoaded', () => {
          seleccionarRolUI_Login('estudiante');
      });

      function seleccionarRolUI_Login(role) {
          APP.selectedRole = role;
          const btnEstudiante = document.getElementById('btnLoginEstudiante');
          const btnArrendador = document.getElementById('btnLoginArrendador');
          const btnAdmin = document.getElementById('btnLoginAdmin');
          
          const activeClass = ['bg-white', 'shadow', 'text-primary'];
          const inactiveClass = ['text-gray-500', 'hover:text-gray-900'];
          
          [btnEstudiante, btnArrendador, btnAdmin].forEach(btn => {
              btn.classList.remove(...activeClass);
              btn.classList.add(...inactiveClass);
          });
          
          if(role === 'estudiante') { btnEstudiante.classList.add(...activeClass); btnEstudiante.classList.remove(...inactiveClass); }
          if(role === 'arrendador') { btnArrendador.classList.add(...activeClass); btnArrendador.classList.remove(...inactiveClass); }
          if(role === 'administrador') { btnAdmin.classList.add(...activeClass); btnAdmin.classList.remove(...inactiveClass); }
      }

      function togglePasswordVisibility(inputId, iconId) {
          const input = document.getElementById(inputId);
          const icon = document.getElementById(iconId);
          if (input.type === 'password') {
              input.type = 'text';
              icon.textContent = 'visibility';
          } else {
              input.type = 'password';
              icon.textContent = 'visibility_off';
          }
      }
    </script>
