<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CuscoRent — Inicio Estudiante</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    :root {
      --green-dark: #22c55e;
      --green-main: #4ade80;
      --green-light: #bbf7d0;
      --green-bg: #f0fdf4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f8f9fa; }

    /* ── NAVBAR ── */
    .navbar {
      background: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-weight: 800;
      font-size: 1.35rem;
      color: #1a1a2e;
    }
    .nav-logo span { color: var(--green-dark); }
    .nav-links {
      display: flex;
      align-items: center;
      gap: .25rem;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .6rem 1.1rem;
      border-radius: 10px;
      font-size: .88rem;
      font-weight: 600;
      color: #555;
      background: none;
      border: none;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .nav-link:hover { background: var(--green-bg); color: #1a1a2e; }
    .nav-link.active { background: var(--green-main); color: #fff; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: #f1f3f4;
      border-radius: 25px;
      padding: .5rem 1rem;
      gap: .5rem;
    }
    .search-box input {
      border: none;
      background: none;
      outline: none;
      font-size: .85rem;
      width: 200px;
    }
    .search-box .material-icons-outlined { color: #999; font-size: 20px; }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: #f1f3f4;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 22px;
      transition: background .2s, color .2s;
      position: relative;
    }
    .icon-btn:hover { background: var(--green-light); color: #166534; }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ── CONTENIDO ── */
    .content { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
    .seccion { display: none; }
    .seccion.active { display: block; }

    /* ── FILTROS INLINE ── */
    .filtros-bar {
      display: none;
      background: white;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .filtros-bar.visible { display: block; }
    .filtros-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }
    .filtro-grupo label {
      display: block;
      font-size: .78rem;
      font-weight: 700;
      color: #555;
      margin-bottom: .4rem;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .filtro-grupo select,
    .filtro-grupo input[type="range"] {
      width: 100%;
      padding: .5rem .7rem;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: .85rem;
      background: #fafafa;
    }
    .filtro-grupo input[type="range"] { padding: 0; }
    .precio-valor { font-size: .8rem; color: #888; margin-top: .25rem; }
    .servicios-chips { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .35rem; }
    .chip {
      padding: .35rem .7rem;
      border-radius: 20px;
      border: 1px solid #e5e7eb;
      font-size: .78rem;
      cursor: pointer;
      background: white;
      transition: all .15s;
      user-select: none;
    }
    .chip.selected { background: var(--green-main); color: white; border-color: var(--green-main); }

    .filtro-botones {
      display: flex;
      gap: .5rem;
      margin-top: 1rem;
      justify-content: flex-end;
    }
    .btn-primary {
      background: var(--green-dark);
      color: white;
      border: none;
      padding: .6rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: .88rem;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-primary:hover { background: #16a34a; }
    .btn-ghost {
      background: none;
      color: #888;
      border: 1px solid #e5e7eb;
      padding: .6rem 1.2rem;
      border-radius: 10px;
      font-size: .85rem;
      cursor: pointer;
    }

    /* ── GRID CATÁLOGO ── */
    .catalogo-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1rem;
    }
    .room-card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      position: relative;
    }
    .room-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,.1);
    }
    .room-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #e2e8f0;
    }
    .heart-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,.85);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #bbb;
      transition: color .2s;
    }
    .heart-btn.fav { color: #ef4444; }
    .room-info {
      padding: .6rem .7rem .75rem;
    }
    .room-tipo {
      font-size: .65rem;
      font-weight: 700;
      color: var(--green-dark);
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .room-precio {
      font-size: .95rem;
      font-weight: 800;
      color: #1a1a2e;
      margin-top: .2rem;
    }
    .room-precio span { font-size: .7rem; font-weight: 500; color: #999; }
    .room-barrio {
      font-size: .72rem;
      color: #999;
      margin-top: .15rem;
    }
    .room-rating {
      display: flex;
      align-items: center;
      gap: .2rem;
      margin-top: .25rem;
      font-size: .72rem;
      color: #f59e0b;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #999;
    }

    /* ── FAVORITOS GRID ── */
    .favoritos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }
    .fav-card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
      display: flex;
      gap: 0;
    }
    .fav-card-img {
      width: 140px;
      min-height: 120px;
      object-fit: cover;
      background: #e2e8f0;
    }
    .fav-card-body {
      padding: 1rem;
      flex: 1;
    }

    /* ── MENSAJES ── */
    .mensajes-lista { display: flex; flex-direction: column; gap: .75rem; }
    .msg-card {
      background: white;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      box-shadow: 0 1px 6px rgba(0,0,0,.04);
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }
    .msg-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #166534;
      flex-shrink: 0;
    }
    .msg-content { flex: 1; }
    .msg-header { display: flex; justify-content: space-between; margin-bottom: .25rem; }
    .msg-name { font-weight: 700; font-size: .88rem; color: #1a1a2e; }
    .msg-time { font-size: .72rem; color: #bbb; }
    .msg-text { font-size: .84rem; color: #555; line-height: 1.4; }
    .msg-badge {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: 8px;
      font-size: .65rem;
      font-weight: 600;
      background: #dbeafe;
      color: #1d4ed8;
    }

    /* ── ROOMMATES ── */
    .roommates-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }
    .rm-card {
      background: white;
      border-radius: 14px;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
    }
    .rm-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto .75rem;
      font-weight: 800;
      color: #166534;
      font-size: 1.4rem;
    }
    .rm-name { font-weight: 700; color: #1a1a2e; font-size: .95rem; }
    .rm-info { font-size: .8rem; color: #999; margin-top: .2rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) {
      .catalogo-grid { grid-template-columns: repeat(4, 1fr); }
      .filtros-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .catalogo-grid { grid-template-columns: repeat(2, 1fr); }
      .filtros-grid { grid-template-columns: 1fr; }
      .favoritos-grid, .roommates-grid { grid-template-columns: 1fr; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <!-- ═══════════════ NAVBAR ═══════════════ -->
  <nav class="navbar">
    <div class="nav-logo"><span>Cusco</span>Rent</div>
    <div class="nav-links">
      <button class="nav-link active" onclick="switchSection('catalogo')">
        <span class="material-icons-outlined">explore</span> Explorar
      </button>
      <button class="nav-link" onclick="switchSection('favoritos')">
        <span class="material-icons-outlined">favorite_border</span> Favoritos
      </button>
      <button class="nav-link" onclick="switchSection('roommates')">
        <span class="material-icons-outlined">people</span> Roommates
      </button>
      <button class="nav-link" onclick="switchSection('mensajes')">
        <span class="material-icons-outlined">chat_bubble_outline</span> Mensajes
      </button>
    </div>
    <div class="nav-right">
      <div class="search-box">
        <span class="material-icons-outlined">search</span>
        <input type="text" placeholder="Buscar barrio..." id="buscadorBarrio" oninput="buscarBarrio()">
      </div>
      <button class="icon-btn" onclick="toggleFiltros()" title="Filtros">
        <span class="material-icons-outlined">tune</span>
      </button>
      <button class="icon-btn" onclick="location.href='<?= getScriptUrl() ?>?page=PerfilEstudiante'" title="Mi perfil">
        <span class="material-icons-outlined">account_circle</span>
      </button>
    </div>
  </nav>

  <!-- ═══════════════ CONTENIDO ═══════════════ -->
  <div class="content">
    <!-- FILTROS INLINE -->
    <div class="filtros-bar" id="filtrosBar">
      <div class="filtros-grid">
        <div class="filtro-grupo">
          <label>Distrito</label>
          <select id="filtroDistrito" onchange="aplicarFiltros()">
            <option value="Todos">Todos los distritos</option>
            <option value="Cusco">Cusco</option>
            <option value="Wanchaq">Wanchaq</option>
            <option value="Santiago">Santiago</option>
            <option value="San Sebastián">San Sebastián</option>
            <option value="San Jerónimo">San Jerónimo</option>
            <option value="Saylla">Saylla</option>
            <option value="Poroy">Poroy</option>
          </select>
        </div>
        <div class="filtro-grupo">
          <label>Precio máximo: S/ <span id="precioValor">2000</span></label>
          <input type="range" id="filtroPrecio" min="100" max="2000" step="50" value="2000" oninput="document.getElementById('precioValor').textContent=this.value; aplicarFiltros()">
        </div>
        <div class="filtro-grupo">
          <label>Tipo de cuarto</label>
          <select id="filtroTipo" onchange="aplicarFiltros()">
            <option value="Todos">Todos</option>
            <option value="Individual">Individual</option>
            <option value="Compartido">Compartido</option>
            <option value="Departamento">Departamento</option>
            <option value="Studio">Studio</option>
          </select>
        </div>
        <div class="filtro-grupo">
          <label>Servicios</label>
          <div class="servicios-chips" id="serviciosChips">
            <span class="chip" onclick="toggleChip(this)" data-valor="Wifi">Wifi</span>
            <span class="chip" onclick="toggleChip(this)" data-valor="Agua">Agua</span>
            <span class="chip" onclick="toggleChip(this)" data-valor="Luz">Luz</span>
            <span class="chip" onclick="toggleChip(this)" data-valor="Gas">Gas</span>
            <span class="chip" onclick="toggleChip(this)" data-valor="Estudio">Estudio</span>
            <span class="chip" onclick="toggleChip(this)" data-valor="Lavandería">Lavandería</span>
          </div>
        </div>
      </div>
      <div class="filtro-botones">
        <button class="btn-ghost" onclick="limpiarFiltros()">Limpiar filtros</button>
        <button class="btn-primary" onclick="aplicarFiltros()">Aplicar filtros</button>
      </div>
    </div>

    <!-- ══ SECCIÓN: CATÁLOGO ══ -->
    <div class="seccion active" id="seccion-catalogo">
      <div class="catalogo-grid" id="catalogoGrid">
        <!-- Se llena dinámicamente -->
      </div>
    </div>

    <!-- ══ SECCIÓN: FAVORITOS ══ -->
    <div class="seccion" id="seccion-favoritos">
      <h2 style="margin-bottom:1rem; color:#1a1a2e;">Mis Favoritos</h2>
      <div class="favoritos-grid" id="favoritosGrid"></div>
    </div>

    <!-- ══ SECCIÓN: ROOMMATES ══ -->
    <div class="seccion" id="seccion-roommates">
      <h2 style="margin-bottom:1rem; color:#1a1a2e;">Roommates Disponibles</h2>
      <div class="roommates-grid" id="roommatesGrid"></div>
    </div>

    <!-- ══ SECCIÓN: MENSAJES ══ -->
    <div class="seccion" id="seccion-mensajes">
      <h2 style="margin-bottom:1rem; color:#1a1a2e;">Mensajes</h2>
      <div class="mensajes-lista" id="mensajesLista"></div>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════
       VARIABLES GLOBALES
    ═══════════════════════════════════════ */
    let hospedajesGlobal = [];
    let favoritos = JSON.parse(localStorage.getItem('favoritos') || '[]');
    let currentUser = null;

    /* ═══════════════════════════════════════
       INICIALIZACIÓN
    ═══════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', function() {
      try {
        currentUser = JSON.parse(localStorage.getItem('user'));
      } catch(e) { currentUser = null; }
      if (!currentUser || !currentUser.EstudianteID) {
        window.location.href = '<?= getScriptUrl() ?>?page=Login';
        return;
      }
      cargarCatalogo();
      renderFavoritos();
    });

    /* ═══════════════════════════════════════
       NAVEGACIÓN ENTRE SECCIONES
    ═══════════════════════════════════════ */
    function switchSection(section) {
      document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
      document.getElementById('seccion-' + section).classList.add('active');
      document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');
      if (section === 'roommates') cargarRoommates();
      if (section === 'mensajes') cargarMensajes();
      if (section === 'favoritos') renderFavoritos();
    }

    /* ═══════════════════════════════════════
       FILTROS
    ═══════════════════════════════════════ */
    function toggleFiltros() {
      document.getElementById('filtrosBar').classList.toggle('visible');
    }

    function toggleChip(el) {
      el.classList.toggle('selected');
      aplicarFiltros();
    }

    function aplicarFiltros() {
      const distrito = document.getElementById('filtroDistrito').value;
      const precioMax = Number(document.getElementById('filtroPrecio').value);
      const tipo = document.getElementById('filtroTipo').value;
      const servicios = [];
      document.querySelectorAll('#serviciosChips .chip.selected').forEach(c => servicios.push(c.dataset.valor));

      let filtered = hospedajesGlobal.filter(h => {
        if (distrito !== 'Todos' && h.Distrito !== distrito) return false;
        if (Number(h.PrecioMensual) > precioMax) return false;
        if (tipo !== 'Todos' && h.TipoHabitacion !== tipo) return false;
        if (servicios.length > 0) {
          const hServicios = (h.Servicios || '').toLowerCase();
          for (const s of servicios) {
            if (!hServicios.includes(s.toLowerCase())) return false;
          }
        }
        return true;
      });
      renderCatalogo(filtered);
    }

    function limpiarFiltros() {
      document.getElementById('filtroDistrito').value = 'Todos';
      document.getElementById('filtroPrecio').value = 2000;
      document.getElementById('precioValor').textContent = '2000';
      document.getElementById('filtroTipo').value = 'Todos';
      document.querySelectorAll('#serviciosChips .chip').forEach(c => c.classList.remove('selected'));
      document.getElementById('buscadorBarrio').value = '';
      renderCatalogo(hospedajesGlobal);
    }

    /* ═══════════════════════════════════════
       BÚSQUEDA POR BARRIO
    ═══════════════════════════════════════ */
    function buscarBarrio() {
      const q = document.getElementById('buscadorBarrio').value.toLowerCase().trim();
      if (!q) {
        renderCatalogo(hospedajesGlobal);
        return;
      }
      const filtered = hospedajesGlobal.filter(h =>
        (h.Distrito || '').toLowerCase().includes(q) ||
        (h.Titulo || '').toLowerCase().includes(q) ||
        (h.Direccion || '').toLowerCase().includes(q)
      );
      renderCatalogo(filtered);
    }

    /* ═══════════════════════════════════════
       CATÁLOGO
    ═══════════════════════════════════════ */
    function cargarCatalogo() {
      google.script.run
        .withSuccessHandler(function(data) {
          hospedajesGlobal = data || [];
          renderCatalogo(hospedajesGlobal);
        })
        .withFailureHandler(function(err) {
          console.error('Error cargando catálogo:', err);
          document.getElementById('catalogoGrid').innerHTML = '<div class="empty-state">Error al cargar habitaciones</div>';
        })
        .getHospedajes();
    }

    function renderCatalogo(list) {
      const grid = document.getElementById('catalogoGrid');
      if (!list || list.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No se encontraron habitaciones</div>';
        return;
      }
      grid.innerHTML = list.map(function(h) {
        const isFav = favoritos.includes(h.HospedajeID);
        const imgSrc = (h.ImagenURL || h.FotoURL || h.Imagen || '').split(',')[0].trim();
        return '<div class="room-card" onclick="abrirDetalles(\'' + h.HospedajeID + '\')">' +
          '<img class="room-img" src="' + (imgSrc || 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=400&h=300&fit=crop') + '" alt="Habitación">' +
          '<button class="heart-btn ' + (isFav ? 'fav' : '') + '" onclick="event.stopPropagation(); toggleFavorito(\'' + h.HospedajeID + '\', this)">' +
            '<span class="material-icons-outlined" style="font-size:16px">' + (isFav ? 'favorite' : 'favorite_border') + '</span>' +
          '</button>' +
          '<div class="room-info">' +
            '<div class="room-tipo">' + (h.TipoHabitacion || 'Habitación') + '</div>' +
            '<div class="room-precio">S/ ' + (h.PrecioMensual || '---') + ' <span>/mes</span></div>' +
            '<div class="room-barrio">' + (h.Distrito || 'Cusco') + '</div>' +
            '<div class="room-rating">' +
              '<span class="material-icons-outlined" style="font-size:14px">star</span> ' + (h.CalificacionPromedio || 'Nuevo') +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    /* ═══════════════════════════════════════
       FAVORITOS
    ═══════════════════════════════════════ */
    function toggleFavorito(hospedajeId, btn) {
      const idx = favoritos.indexOf(hospedajeId);
      if (idx > -1) {
        favoritos.splice(idx, 1);
        btn.classList.remove('fav');
        btn.querySelector('span').textContent = 'favorite_border';
      } else {
        favoritos.push(hospedajeId);
        btn.classList.add('fav');
        btn.querySelector('span').textContent = 'favorite';
      }
      localStorage.setItem('favoritos', JSON.stringify(favoritos));
    }

    function renderFavoritos() {
      const grid = document.getElementById('favoritosGrid');
      const favHospedajes = hospedajesGlobal.filter(h => favoritos.includes(h.HospedajeID));
      if (favHospedajes.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No tienes favoritos aún. ¡Explora y dale corazón!</div>';
        return;
      }
      grid.innerHTML = favHospedajes.map(function(h) {
        const imgSrc = (h.ImagenURL || h.FotoURL || h.Imagen || '').split(',')[0].trim();
        return '<div class="fav-card" onclick="abrirDetalles(\'' + h.HospedajeID + '\')">' +
          '<img class="fav-card-img" src="' + (imgSrc || 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=400&h=300&fit=crop') + '" alt="">' +
          '<div class="fav-card-body">' +
            '<div class="room-tipo">' + (h.TipoHabitacion || 'Habitación') + '</div>' +
            '<div class="room-precio">S/ ' + (h.PrecioMensual || '---') + ' <span>/mes</span></div>' +
            '<div class="room-barrio">' + (h.Distrito || 'Cusco') + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    /* ═══════════════════════════════════════
       ROOMMATES
    ═══════════════════════════════════════ */
    function cargarRoommates() {
      google.script.run
        .withSuccessHandler(function(data) {
          renderRoommates(data || []);
        })
        .withFailureHandler(function(err) {
          console.error('Error cargando roommates:', err);
          document.getElementById('roommatesGrid').innerHTML = '<div class="empty-state">Error al cargar roommates</div>';
        })
        .getRoommatesDisponibles();
    }

    function renderRoommates(list) {
      const grid = document.getElementById('roommatesGrid');
      if (!list || list.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No hay roommates disponibles en este momento</div>';
        return;
      }
      grid.innerHTML = list.map(function(rm) {
        const iniciales = (rm.NombreCompleto || 'R').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        return '<div class="rm-card">' +
          '<div class="rm-avatar">' + iniciales + '</div>' +
          '<div class="rm-name">' + (rm.NombreCompleto || 'Roommate') + '</div>' +
          '<div class="rm-info">' + (rm.Carrera || '') + ' — ' + (rm.Distrito || 'Cusco') + '</div>' +
          '<div class="rm-info">' + (rm.Intereses || '') + '</div>' +
          '<button class="btn-primary" style="margin-top:.75rem" onclick="event.stopPropagation();">Contactar</button>' +
        '</div>';
      }).join('');
    }

    /* ═══════════════════════════════════════
       MENSAJES
    ═══════════════════════════════════════ */
    function cargarMensajes() {
      google.script.run
        .withSuccessHandler(function(data) {
          renderMensajes(data || []);
        })
        .withFailureHandler(function(err) {
          console.error('Error cargando mensajes:', err);
          document.getElementById('mensajesLista').innerHTML = '<div class="empty-state">Error al cargar mensajes</div>';
        })
        .getMensajesPorUsuario(currentUser.EstudianteID);
    }

    function renderMensajes(list) {
      const container = document.getElementById('mensajesLista');
      if (!list || list.length === 0) {
        container.innerHTML = '<div class="empty-state">No tienes mensajes aún</div>';
        return;
      }
      container.innerHTML = list.map(function(m) {
        const initials = (m.RemitenteNombre || m.RemitenteID || '?').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        const fecha = m.FechaHora ? new Date(m.FechaHora).toLocaleDateString('es-PE', { day:'2-digit', month:'short' }) : '';
        return '<div class="msg-card">' +
          '<div class="msg-avatar">' + initials + '</div>' +
          '<div class="msg-content">' +
            '<div class="msg-header">' +
              '<span class="msg-name">' + (m.RemitenteNombre || m.RemitenteID) + '</span>' +
              '<span class="msg-time">' + fecha + '</span>' +
            '</div>' +
            '<div class="msg-text">' + (m.Mensaje || '') + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    /* ═══════════════════════════════════════
       NAVEGACIÓN A DETALLES
    ═══════════════════════════════════════ */
    function abrirDetalles(hospedajeId) {
      window.location.href = '<?= getScriptUrl() ?>?page=DetallesHabitacion&id=' + hospedajeId;
    }
  </script>
</body>
</html>
