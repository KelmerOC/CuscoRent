<script>
    // ============================================================
    // STATE
    // ============================================================
    const APP = {
        selectedRole: 'estudiante',
        currentUser: null,
        currentEmail: '',
        currentRole: '',
        pendingFiles: {}
    };

    // ============================================================
    // TOAST NOTIFICATIONS
    // ============================================================
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        if(!container) return;
        const toast = document.createElement('div');
        const icons = { success: 'check_circle', error: 'error', info: 'info' };
        toast.className = `toast ${type}`;
        
        toast.innerHTML = `
            <span class="material-symbols-outlined icon">${icons[type] || 'info'}</span>
            <span class="font-medium text-sm">${message}</span>
        `;
        
        container.appendChild(toast);
        
        // Animate in
        requestAnimationFrame(() => {
            toast.classList.add('animate-slide-up');
        });
        
        setTimeout(() => {
            toast.classList.add('opacity-0');
            toast.style.transform = 'translateY(100%)';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    // ============================================================
    // LOADER
    // ============================================================
    function showLoader(text = 'Procesando...') {
        const loader = document.getElementById('overlayLoader');
        if(loader) {
            document.getElementById('loaderText').textContent = text;
            loader.classList.remove('hidden');
        }
    }
    
    function hideLoader() {
        const loader = document.getElementById('overlayLoader');
        if(loader) {
            loader.classList.add('hidden');
        }
    }

    // ============================================================
    // MODAL (confirm + alert estilizados)
    // ============================================================
    let modalCallback = null;
    let modalType = 'confirm';

    function ensureModalContainer() {
        let m = document.getElementById('appConfirmModal');
        if (m) return m;
        m = document.createElement('div');
        m.id = 'appConfirmModal';
        m.className = 'modal-backdrop hidden';
        m.setAttribute('role', 'dialog');
        m.setAttribute('aria-modal', 'true');
        m.setAttribute('aria-labelledby', 'appConfirmTitle');
        m.innerHTML = `
            <div class="modal-content" role="document">
                <button type="button" onclick="closeAppModal()" aria-label="Cerrar"
                    class="modal-close">
                    <span class="material-symbols-outlined">close</span>
                </button>
                <div class="modal-header">
                    <div class="flex items-start gap-4">
                        <div id="appConfirmIconWrap" class="w-12 h-12 flex-shrink-0 rounded-xl bg-primary/10 text-primary flex items-center justify-center">
                            <span class="material-symbols-outlined text-3xl" id="appConfirmIcon">help</span>
                        </div>
                        <div class="flex-1">
                            <h3 id="appConfirmTitle" class="text-lg font-bold text-charcoal mb-1">Confirmar</h3>
                            <p id="appConfirmMessage" class="text-sm text-gray-600 whitespace-pre-wrap">¿Estás seguro?</p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="appConfirmCancel" onclick="closeAppModal(false)"
                        class="btn btn-ghost">
                        Cancelar
                    </button>
                    <button type="button" id="appConfirmOk" onclick="closeAppModal(true)"
                        class="btn btn-primary">
                        Confirmar
                    </button>
                </div>
            </div>
        `;
        m.addEventListener('click', function(e) {
            if (e.target === m) closeAppModal(false);
        });
        document.body.appendChild(m);
        return m;
    }

    function showConfirmModal(titulo, mensaje, onConfirm, opts) {
        opts = opts || {};
        const m = ensureModalContainer();
        document.getElementById('appConfirmTitle').textContent = titulo || 'Confirmar';
        document.getElementById('appConfirmMessage').textContent = mensaje || '';
        const okBtn = document.getElementById('appConfirmOk');
        const cancelBtn = document.getElementById('appConfirmCancel');
        const icon = document.getElementById('appConfirmIcon');
        const iconWrap = document.getElementById('appConfirmIconWrap');

        if (opts.danger) {
            okBtn.className = 'btn btn-danger';
            iconWrap.className = 'w-12 h-12 flex-shrink-0 rounded-xl bg-secondary/10 text-secondary flex items-center justify-center';
            icon.textContent = 'warning';
            okBtn.textContent = opts.okLabel || 'Eliminar';
        } else {
            okBtn.className = 'btn btn-primary';
            iconWrap.className = 'w-12 h-12 flex-shrink-0 rounded-xl bg-primary/10 text-primary flex items-center justify-center';
            icon.textContent = 'help';
            okBtn.textContent = opts.okLabel || 'Confirmar';
        }
        cancelBtn.textContent = opts.cancelLabel || 'Cancelar';
        cancelBtn.classList.toggle('hidden', !!opts.hideCancel);

        modalType = opts.alertOnly ? 'alert' : 'confirm';
        modalCallback = onConfirm || null;
        m.classList.remove('hidden');
        trapFocus(m);
    }

    function showAlertModal(titulo, mensaje, opts) {
        opts = opts || {};
        opts.alertOnly = true;
        opts.okLabel = opts.okLabel || 'Entendido';
        showConfirmModal(titulo, mensaje, null, opts);
    }

    function closeAppModal(result) {
        const m = document.getElementById('appConfirmModal');
        if (!m) return;
        m.classList.add('hidden');
        if (result === true && typeof modalCallback === 'function') {
            try { modalCallback(); } catch(e) { console.error(e); }
        }
        modalCallback = null;
        modalType = 'confirm';
    }

    function mostrarModal(titulo, mensaje, onConfirm) {
        showConfirmModal(titulo, mensaje, onConfirm);
    }

    // ============================================================
    // UNIFIED TAB SWITCHING (centralized for all pages)
    // ============================================================
    function switchTab(activeTab, allTabs, tabPrefix, sectionPrefix) {
        tabPrefix = tabPrefix || 'tabBtn';
        sectionPrefix = sectionPrefix || 'seccion';
        const tabs = Array.isArray(allTabs) ? allTabs : [allTabs];
        tabs.forEach(t => {
            const seccion = document.getElementById(sectionPrefix + '-' + t);
            const boton = document.getElementById(tabPrefix + '-' + t);
            if (seccion) {
                seccion.classList.toggle('hidden', t !== activeTab);
                if (t === activeTab) seccion.classList.remove('hidden');
            }
            if (boton) {
                boton.classList.toggle('active', t === activeTab);
                if (t !== activeTab) boton.classList.remove('active');
            }
        });
    }

    function switchMainTab(tab) {
        var pageTabs;
        if (APP.currentRole === 'estudiante') {
            pageTabs = ['buscar', 'reservas', 'roommates', 'documentos'];
        } else if (APP.currentRole === 'arrendador') {
            pageTabs = ['habitaciones', 'reservas', 'mensajes', 'documentos'];
        } else if (APP.currentRole === 'administrador') {
            pageTabs = ['dashboard', 'habitaciones', 'estudiantes', 'arrendadores'];
        } else {
            pageTabs = ['buscar', 'reservas', 'roommates', 'documentos', 'habitaciones', 'mensajes', 'documentos', 'dashboard', 'estudiantes', 'arrendadores'];
        }
        pageTabs.forEach(t => {
            var seccion = document.getElementById('seccion-' + t);
            var boton = document.getElementById('tabBtn-' + t);
            if (seccion) seccion.classList.toggle('hidden', t !== tab);
            if (boton) boton.classList.toggle('active', t === tab);
        });
    }

    function switchDocTab(tab, allDocTabs) {
        allDocTabs = allDocTabs || ['perfil', 'carne', 'dni'];
        allDocTabs.forEach(t => {
            var panel = document.getElementById('panel-doc-' + t);
            var btn = document.getElementById('tab-doc-' + t);
            if (panel) panel.classList.toggle('hidden', t !== tab);
            if (btn) {
                btn.classList.remove('tab-active');
                btn.classList.add('tab-inactive');
            }
        });
        var activeBtn = document.getElementById('tab-doc-' + tab);
        if (activeBtn) {
            activeBtn.classList.remove('tab-inactive');
            activeBtn.classList.add('tab-active');
        }
    }

    function switchAdminTab(tab) {
        var allAdminTabs = ['dashboard', 'habitaciones', 'estudiantes', 'arrendadores'];
        allAdminTabs.forEach(t => {
            var seccion = document.getElementById('seccion-' + t);
            var boton = document.getElementById('tabBtn-' + t);
            if (seccion) seccion.classList.toggle('hidden', t !== tab);
            if (boton) boton.classList.toggle('active', t === tab);
        });
    }

    // ============================================================
    // ROLE & PASSWORD VISIBILITY
    // ============================================================
    function seleccionarRolUI_Login(role) {
        APP.selectedRole = role;
        var activeCls = ['bg-white', 'shadow', 'text-primary'];
        var inactiveCls = ['text-gray-500', 'hover:text-gray-900'];
        var bE = document.getElementById('btnLoginEstudiante');
        var bA = document.getElementById('btnLoginArrendador');
        var bAd = document.getElementById('btnLoginAdmin');
        [bE, bA, bAd].forEach(function(b) {
            if (!b) return;
            b.classList.remove.apply(b.classList, activeCls);
            b.classList.add.apply(b.classList, inactiveCls);
        });
        var target = role === 'estudiante' ? bE : role === 'arrendador' ? bA : bAd;
        if (target) {
            target.classList.add.apply(target.classList, activeCls);
            target.classList.remove.apply(target.classList, inactiveCls);
        }
    }

    function togglePasswordVisibility(inputId, iconId) {
        var input = document.getElementById(inputId);
        var icon = document.getElementById(iconId);
        if (!input || !icon) return;
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility';
        } else {
            input.type = 'password';
            icon.textContent = 'visibility_off';
        }
    }

    // ============================================================
    // ACCESSIBILITY HELPERS
    // ============================================================
    function initSkipLink() {
        var skip = document.createElement('a');
        skip.href = '#main-content';
        skip.className = 'skip-link';
        skip.textContent = 'Saltar al contenido principal';
        document.body.insertBefore(skip, document.body.firstChild);
    }

    function trapFocus(modal) {
        var focusable = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
        if (!focusable.length) return;
        var first = focusable[0];
        var last = focusable[focusable.length - 1];
        modal.addEventListener('keydown', function(e) {
            if (e.key !== 'Tab') return;
            if (e.shiftKey && document.activeElement === first) {
                e.preventDefault();
                last.focus();
            } else if (!e.shiftKey && document.activeElement === last) {
                e.preventDefault();
                first.focus();
            }
        });
        first.focus();
    }

    function announce(message, politeness) {
        politeness = politeness || 'polite';
        var announcer = document.getElementById('sr-announcer');
        if (!announcer) {
            announcer = document.createElement('div');
            announcer.id = 'sr-announcer';
            announcer.setAttribute('aria-live', politeness);
            announcer.setAttribute('aria-atomic', 'true');
            announcer.className = 'visually-hidden';
            document.body.appendChild(announcer);
        }
        announcer.textContent = message;
    }

    // ============================================================
    // AUTH / LOGIN / REGISTER
    // ============================================================
    function seleccionarRolUI_Reg(role) {
        document.querySelectorAll('.role-btn-reg').forEach(btn => {
            if(btn.dataset.role === role) {
                btn.classList.add('bg-white', 'shadow', 'text-primary');
                btn.classList.remove('text-gray-500', 'hover:text-gray-900');
            } else {
                btn.classList.remove('bg-white', 'shadow', 'text-primary');
                btn.classList.add('text-gray-500', 'hover:text-gray-900');
            }
        });
        document.getElementById('regRole').value = role;
        const estExtra = document.getElementById('estudianteExtraFields');
        if (estExtra) {
            estExtra.classList.toggle('hidden', role !== 'estudiante');
        }
    }
    
    function openRegisterModal() {
        document.getElementById('registerModal').classList.remove('hidden');
        seleccionarRolUI_Reg('estudiante');
    }

    function closeRegisterModal() {
        document.getElementById('registerModal').classList.add('hidden');
    }

    function openForgotModal() {
        document.getElementById('forgotModal').classList.remove('hidden');
    }

    function closeForgotModal() {
        document.getElementById('forgotModal').classList.add('hidden');
    }

    function handleForgot(e) {
        e.preventDefault();
        const email = document.getElementById('forgotEmail').value.trim();
        if (!email) return showToast('Ingresa tu correo.', 'error');
        
        showLoader('Buscando cuenta y enviando correo...');
        google.script.run
            .withSuccessHandler(result => {
                hideLoader();
                if (result.success) {
                    showToast(result.message, 'success');
                    closeForgotModal();
                    document.getElementById('forgotEmail').value = '';
                } else {
                    showToast(result.message, 'error');
                }
            })
            .withFailureHandler(err => {
                hideLoader();
                showToast('Error de conexión: ' + err.message, 'error');
            })
            .recuperarCuenta(email);
    }

    function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        const role = APP.selectedRole;
        
        if (!email || !password) {
            return showToast('Completa todos los campos.', 'error');
        }
        
        showLoader('Verificando credenciales...');
        google.script.run
            .withSuccessHandler(result => {
                hideLoader();
                if (result.success) {
                    showToast('¡Bienvenido!', 'success');
                    iniciarDashboard(email, role, result.user);
                } else {
                    showToast(result.message, 'error');
                }
            })
            .withFailureHandler(err => {
                hideLoader();
                showToast('Error de conexión: ' + err.message, 'error');
            })
            .loginUser(email, password, role);
    }

     function handleRegister(e) {
         e.preventDefault();
         const role = document.getElementById('regRole').value;
         const email = document.getElementById('regEmail').value.trim();
         const password = document.getElementById('regPassword').value;
         const nombre = document.getElementById('regNombre').value.trim();
         const telefono = document.getElementById('regTelefono').value.trim();
         
         if (!nombre || !email || !password) {
             return showToast('Completa los campos obligatorios.', 'error');
         }
         
         const userData = {};
         if (role === 'estudiante') {
             userData['CorreoInstitucional'] = email;
             userData['Contrasena'] = password;
             userData['NombreCompleto'] = nombre;
             userData['Telefono'] = telefono;
             userData['BuscaRoommate'] = document.getElementById('regBuscaRoommate').checked ? 'Sí' : 'No';
             userData['Intereses'] = document.getElementById('regIntereses').value.trim();
         } else {
             userData['Email'] = email;
             userData['Contrasena'] = password;
             userData['NombreCompleto'] = nombre;
             userData['Telefono'] = telefono;
         }
         
         showLoader('Creando tu cuenta...');
         google.script.run
             .withSuccessHandler(result => {
                 hideLoader();
                 if (result.success) {
                     showToast('¡Cuenta creada! Inicia sesión.', 'success');
                     closeRegisterModal();
                     document.getElementById('authEmail').value = email;
                     document.getElementById('authPassword').value = '';
                     google.script.run
                         .withSuccessHandler(() => {})
                         .withFailureHandler(err => {
                             showToast('Error al crear carpetas: ' + err.message, 'error');
                         })
                         .inicializarCarpetasUsuario(role, email);
                 } else {
                     showToast(result.message, 'error');
                 }
             })
             .withFailureHandler(err => {
                 hideLoader();
                 showToast('Error: ' + err.message, 'error');
             })
             .registerUser(role, userData);
     }

    // ============================================================
    // NAVIGATION
    // ============================================================
    function redirectTop(url) {
        if (!url || url.includes('undefined') || url === '?page=Login') {
            window.location.href = url || 'index.html?page=Login';
            return;
        }
        const form = document.createElement('form');
        form.method = 'GET';
        form.action = url.split('?')[0];
        form.target = '_top';
        
        const params = new URLSearchParams(url.split('?')[1] || '');
        for (const [key, value] of params.entries()) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = value;
            form.appendChild(input);
        }
        
        document.body.appendChild(form);
        form.submit();
    }

    function iniciarDashboard(email, role, user) {
        APP.currentEmail = email;
        APP.currentRole = role;
        APP.currentUser = user;
        localStorage.setItem('user', JSON.stringify(user));
        
        let page = role === 'estudiante' ? 'Estudiante' : role === 'arrendador' ? 'Arrendador' : 'Administrador';
        try {
            redirectTop(SCRIPT_URL + '?page=' + page);
        } catch(e) {
            window.location.href = SCRIPT_URL + '?page=' + page;
        }
    }

    function cerrarSesion() {
        localStorage.removeItem('user');
        try {
            redirectTop(SCRIPT_URL + '?page=Login');
        } catch(e) {
            window.location.href = SCRIPT_URL + '?page=Login';
        }
    }

    // ============================================================
    // IMAGE COMPRESSION (Canvas API)
    // ============================================================
    function compressImage(file, maxWidth = 1920, quality = 0.80) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                    if (height > maxWidth) {
                        width = Math.round((width * maxWidth) / height);
                        height = maxWidth;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                    const compressedSize = Math.round((compressedBase64.length * 3) / 4);
                    
                    resolve({
                        base64: compressedBase64,
                        originalSize: file.size,
                        compressedSize: compressedSize,
                        width: width,
                        height: height,
                        mimeType: 'image/jpeg',
                        fileName: file.name.replace(/\.\w+$/, '.jpg')
                    });
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    function formatBytes(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(2) + ' MB';
    }

    // ============================================================
    // FILE HANDLING
    // ============================================================
    function handleFileSelect(event, tipoUsuario, categoria, subcategoria) {
        const files = Array.from(event.target.files);
        if (files.length === 0) return;
        
        const file = files[0];
        const ext = file.name.split('.').pop().toLowerCase();
        if (!['jpg', 'jpeg', 'png'].includes(ext)) {
            showToast('Formato no permitido. Solo JPG y PNG.', 'error');
            event.target.value = '';
            return;
        }
        
        if (file.size > 15 * 1024 * 1024) {
            showToast('El archivo es demasiado grande (máx. 15MB).', 'error');
            event.target.value = '';
            return;
        }
        
        showLoader('Comprimiendo...');
        compressImage(file)
            .then(result => {
                hideLoader();
                const prefix = tipoUsuario === 'estudiante' ? 'est' : 'arr';
                const key = subcategoria || categoria;
                const progressEl = document.getElementById(`progress-${prefix}-${key}`);
                
                const datos = {
                    base64: result.base64,
                    nombreArchivo: result.fileName,
                    mimeType: result.mimeType,
                    tipoUsuario: tipoUsuario,
                    emailUsuario: APP.currentEmail,
                    categoria: categoria,
                    subcategoria: subcategoria || null
                };
                
                if(progressEl) {
                    progressEl.classList.remove('hidden');
                    progressEl.querySelector('div').style.width = '50%';
                }
                
                google.script.run
                    .withSuccessHandler(res => {
                        if(progressEl) progressEl.classList.add('hidden');
                        if(res.success) {
                            showToast(res.message, 'success');
                            cargarImagenesExistentes(); // Recargar todo visualmente
                        } else {
                            showToast(res.message, 'error');
                        }
                    })
                    .subirImagen(datos);
                
                event.target.value = '';
            })
            .catch(err => {
                hideLoader();
                showToast('Error de compresión: ' + err.message, 'error');
                event.target.value = '';
            });
    }

    function cargarImagenesExistentes() {
        if(!APP.currentRole || !APP.currentEmail) return;
        
        google.script.run
            .withSuccessHandler(result => {
                if (result.success) {
                    renderizarTodasLasImagenes(result.imagenes);
                }
            })
            .obtenerTodasLasImagenes(APP.currentRole, APP.currentEmail);
    }

    function renderizarTodasLasImagenes(imagenes) {
        if (APP.currentRole === 'estudiante') {
            renderSingleImage('est', 'foto_perfil', imagenes['foto_perfil'] || []);
            renderSingleImage('est', 'carne_verificacion', imagenes['carne_verificacion'] || []);
            renderSingleImage('est', 'dni', imagenes['dni'] || []);
        } else if (APP.currentRole === 'arrendador') {
            renderGallery('arr', 'habitaciones', imagenes['habitaciones'] || []);
            const datosPersonales = imagenes['datos_personales'] || [];
            renderSingleImage('arr', 'datos_personales', datosPersonales);
        }
    }

    function renderSingleImage(prefix, key, images) {
        const container = document.getElementById(`current-${prefix}-${key}`);
        if (!container) return;
        
        if (!images || images.length === 0) {
            container.innerHTML = ``;
            return;
        }
        
        const img = images[0];
        container.innerHTML = `
            <div class="relative group rounded-xl overflow-hidden shadow-sm border border-gray-200">
                <img src="${img.thumbnailUrl || img.url}" alt="${img.nombre}" class="w-full h-32 object-cover">
                <div class="absolute inset-0 bg-charcoal/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                    <button class="bg-white/20 hover:bg-white/40 p-2 rounded-full text-white" onclick="window.open('${img.url}', '_blank')"><span class="material-symbols-outlined text-sm">open_in_new</span></button>
                    <button class="bg-secondary/80 hover:bg-secondary p-2 rounded-full text-white" onclick="eliminarImagenUI('${img.id}', '${img.nombre}')"><span class="material-symbols-outlined text-sm">delete</span></button>
                </div>
            </div>
        `;
    }

    function renderGallery(prefix, key, images) {
        const container = document.getElementById(`current-${prefix}-${key}`);
        if (!container) return;
        
        container.innerHTML = images.map(img => `
            <div class="relative group rounded-xl overflow-hidden shadow-sm border border-gray-200">
                <img src="${img.thumbnailUrl || img.url}" alt="${img.nombre}" class="w-full h-32 object-cover">
                <div class="absolute inset-0 bg-charcoal/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                    <button class="bg-secondary/80 hover:bg-secondary p-2 rounded-full text-white" onclick="eliminarImagenUI('${img.id}', '${img.nombre}')"><span class="material-symbols-outlined text-sm">delete</span></button>
                </div>
            </div>
        `).join('');
    }

    function eliminarImagenUI(fileId, nombre) {
        showConfirmModal(
            'Eliminar imagen',
            `¿Eliminar la imagen "${nombre}"? Esta acción es irreversible.`,
            function() {
                showLoader('Eliminando imagen...');
                google.script.run
                    .withSuccessHandler(result => {
                        hideLoader();
                        if (result.success) {
                            showToast('Imagen eliminada.', 'success');
                            cargarImagenesExistentes();
                        } else {
                            showToast(result.message, 'error');
                        }
                    })
                    .eliminarImagen(fileId);
            },
            { danger: true, okLabel: 'Eliminar' }
        );
    }
</script>
